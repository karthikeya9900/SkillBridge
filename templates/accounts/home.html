{% extends "base.html" %}
{% block title %}SkillBridge{% endblock %}
{% block content %}
<section class="py-5">

    <div class="col-lg-7">
      <p class="text-primary fw-semibold mb-2">Student Placement Platform</p>
      <h1 class="display-5 fw-bold">SkillBridge</h1>

  </div>
