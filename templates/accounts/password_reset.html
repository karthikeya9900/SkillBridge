{% extends "base.html" %}
{% block title %}Reset password | SkillBridge{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="dashboard-panel p-4">
            <h1 class="h3 mb-3">Reset password</h1>
            <p class="text-muted">Enter your email address and we’ll send password reset instructions.</p>
            <form method="post">
                {% csrf_token %}
                {% include "includes/form.html" %}
                <button class="btn btn-primary w-100">Send reset link</button>
            </form>
            <p class="text-center text-muted mt-3">Remembered your password? <a href="{% url 'login' %}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
