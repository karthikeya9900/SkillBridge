{% extends "base.html" %}
{% block title %}Set a new password | SkillBridge{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="dashboard-panel p-4">
            <h1 class="h3 mb-3">Set a new password</h1>
            {% if invalid_link %}
            <div class="alert alert-danger">This password reset link is invalid or has expired.</div>
            {% else %}
            <form method="post">
                {% csrf_token %}
                {% include "includes/form.html" %}
                <button class="btn btn-primary w-100">Reset password</button>
            </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
